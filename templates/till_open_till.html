{% extends "till_base.html" %}
{% block content %}
<div class="topbar">
    <div>
        <h1 style="margin: 0;">Open Till</h1>
        <div class="muted">{{ staff.name }} is logged in</div>
    </div>
    <div class="row">
        <a class="buttonish" href="{{ url_for('till_totals') }}">Totals And Cash Up</a>
    </div>
</div>

<div class="panel" style="max-width: 560px;">
    <form method="post" action="{{ url_for('open_till_post') }}" class="grid">
        <select name="site_id">
            {% for site in sites %}
            <option value="{{ site.id }}" {% if selected_site_id == site.id %}selected{% endif %}>{{ site.name }}</option>
            {% endfor %}
        </select>
        <select name="terminal_id">
            {% for terminal in terminals %}
            <option value="{{ terminal.id }}" {% if selected_terminal_id == terminal.id %}selected{% endif %}>{{ terminal.name }}</option>
            {% endfor %}
        </select>
        <input type="number" step="0.01" min="0" name="opening_float" value="{{ '%.2f'|format(opening_float_default) }}" required>
        <div class="muted">After a shift cash-up, the next shift starts on zero. Day totals still continue until midnight.</div>
        <button type="submit">Open Till Session</button>
    </form>
</div>
{% endblock %}
