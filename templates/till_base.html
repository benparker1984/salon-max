<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Till" }}</title>
    <style>
        :root {
            --ink: #172033;
            --paper: #f6f6f1;
            --panel: #ffffff;
            --brand: #0f766e;
            --accent: #ea580c;
            --muted: #667085;
            --line: #dde3ea;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                linear-gradient(180deg, #dbeafe 0%, transparent 20%),
                linear-gradient(135deg, #fff7ed 0%, transparent 35%),
                var(--paper);
            color: var(--ink);
        }
        .shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .panel {
            background: var(--panel);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
            margin-bottom: 18px;
        }
        .grid {
            display: grid;
            gap: 18px;
        }
        .grid.cards {
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        input, select, button {
            font: inherit;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--line);
        }
        button {
            background: var(--brand);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        a.buttonish {
            display: inline-block;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 12px;
            background: #ecfeff;
            color: var(--brand);
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid var(--line);
        }
        .muted {
            color: var(--muted);
        }
        .metric {
            font-size: 32px;
            font-weight: 700;
            color: var(--brand);
        }
    </style>
</head>
<body>
    <div class="shell">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
