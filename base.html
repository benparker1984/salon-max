<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Salon Max Back Office" }}</title>
    <style>
        :root {
            --ink: #1f2937;
            --muted: #6b7280;
            --paper: #f7f4ef;
            --panel: #ffffff;
            --brand: #155e75;
            --accent: #d97706;
            --good: #15803d;
            --line: #e5e7eb;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, #dbeafe 0, transparent 30%),
                radial-gradient(circle at bottom right, #fde68a 0, transparent 25%),
                var(--paper);
        }
        .shell {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }
        .nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            background: var(--panel);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        .nav a {
            text-decoration: none;
            color: var(--brand);
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 12px;
            background: #ecfeff;
        }
        h1, h2, h3 { margin-top: 0; }
        .grid {
            display: grid;
            gap: 18px;
        }
        .grid.cards {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }
        .panel {
            background: var(--panel);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        .metric {
            font-size: 32px;
            font-weight: 700;
            color: var(--brand);
            margin: 8px 0 0;
        }
        .muted { color: var(--muted); }
        .stack { display: grid; gap: 12px; }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        input, select, button, textarea {
            font: inherit;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--line);
        }
        textarea {
            min-height: 100px;
            width: 100%;
        }
        button {
            background: var(--brand);
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button.secondary {
            background: var(--accent);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
        }
        .tag {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: #ecfccb;
            color: var(--good);
            font-size: 13px;
            font-weight: 600;
        }
        .tag.warning {
            background: #fef3c7;
            color: #b45309;
        }
        .tag.danger {
            background: #fee2e2;
            color: #b91c1c;
        }
        .tag.neutral {
            background: #e5e7eb;
            color: #374151;
        }
        .alert {
            border-radius: 14px;
            padding: 14px 16px;
            font-weight: 600;
        }
        .alert.warning {
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: #92400e;
        }
        .alert.danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="panel" style="padding:14px 18px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <strong style="font-size:20px; color:var(--brand);">Salon Max Back Office</strong>
                <div class="muted" style="margin-top:4px;">The ultimate salon software</div>
            </div>
        </div>
        <nav class="nav">
            <a href="{{ url_for('cloud_backoffice_dashboard') if app_role == 'cloud' else url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('business_settings') }}">Business Settings</a>
            <a href="{{ url_for('sunbed_settings') }}">Sunbed Settings</a>
            <a href="{{ url_for('customers') }}">Customers</a>
            <a href="{{ url_for('backoffice_staff') if app_role == 'cloud' else url_for('staff') }}">Staff</a>
            <a href="{{ url_for('pricing') }}">Pricing</a>
            <a href="{{ url_for('packages') }}">Packages</a>
            <a href="{{ url_for('store') }}">Store</a>
            <a href="{{ url_for('transactions') }}">Transactions</a>
            <a href="{{ url_for('till_sessions') }}">Till Sessions</a>
            <a href="{{ url_for('reports') }}">Reports</a>
        </nav>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
